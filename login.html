<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="icon" href="favicon.svg/register-access-login-password-internet-260nw-1836823672.webp" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="stylesheet" href="style.css">
    <style>

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: url("https://img.freepik.com/free-photo/beautiful-leaf-watercolor-background-brown-autumn-season_53876-128734.jpg?semt=ais_hybrid&w=740&q=80");
            background-size: cover;
            background-position: center;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <form action="">
            <h1>Login</h1>
            <div class="input-box">
                <input id="enterEmail" type="email" placeholder="Email" required>
                <i class="fa-solid fa-user"></i>
            </div>
            <div class="input-box">
                <input id="firstPassword" type="password" placeholder="Password" required>
                <i class="fa-solid fa-lock"></i>
            </div>
            <button type="button" onclick="login()" class="btn">Login</button>
            <div class="register-link">
                <p>Don't have an account? <a href="#">Register</a></p>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
</body>

</html>
