<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post App</title>
    <link rel="icon" href="favicon.svg/posts.png" type="image/png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- <nav class="navbar">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Post App</span>
        </div>
    </nav> -->
    <nav class="navbar bg-body-tertiary">
        <div id="my-navbar" class="container-fluid">
            <a class="navbar-brand" href="#">
                <img src="https://pngimg.com/uploads/letter_p/letter_p_PNG83.png" alt="Logo" width="35" height="30"
                    class="d-inline-block align-text-top">
                POST APP
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="row">

            <!-- FORM -->
            <div class="col-sm-12 col-md-6 col-lg-4">
                <div class="card p-3 m-2">

                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" class="form-control" id="title" />
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" id="description" rows="3"></textarea>
                    </div>

                    <!-- Images -->
                    <div class="mb-3 d-flex justify-content-around images">
                        <img class="bgImg"
                            onclick="selectImg('https://img.freepik.com/free-vector/modern-abstract-dark-violate-pink-background_84443-2788.jpg?semt=ais_hybrid&w=740&q=80')"
                            src="https://img.freepik.com/free-vector/modern-abstract-dark-violate-pink-background_84443-2788.jpg?semt=ais_hybrid&w=740&q=80"
                            alt="">
                        <img class="bgImg"
                            onclick="selectImg('https://png.pngtree.com/thumb_back/fh260/background/20240522/pngtree-abstract-light-pink-and-purple-background-image_15685363.jpg')"
                            src="https://png.pngtree.com/thumb_back/fh260/background/20240522/pngtree-abstract-light-pink-and-purple-background-image_15685363.jpg">
                        <img class="bgImg"
                            onclick="selectImg('https://static.vecteezy.com/system/resources/thumbnails/059/998/621/small/elegant-floral-blossom-pink-bokeh-effect-soft-light-background-beautiful-blossoms-gentle-pink-hues-photo.jpeg')"
                            src="https://static.vecteezy.com/system/resources/thumbnails/059/998/621/small/elegant-floral-blossom-pink-bokeh-effect-soft-light-background-beautiful-blossoms-gentle-pink-hues-photo.jpeg">
                        <img class="bgImg"
                            onclick="selectImg('https://static.vecteezy.com/system/resources/thumbnails/053/856/736/small/beautiful-blue-sky-with-a-few-red-flowers-in-the-foreground-the-flowers-are-scattered-throughout-the-scene-with-some-in-the-foreground-and-others-in-the-background-free-photo.jpg')"
                            src="https://static.vecteezy.com/system/resources/thumbnails/053/856/736/small/beautiful-blue-sky-with-a-few-red-flowers-in-the-foreground-the-flowers-are-scattered-throughout-the-scene-with-some-in-the-foreground-and-others-in-the-background-free-photo.jpg">
                        <img class="bgImg"
                            onclick="selectImg('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQg_OOjHVS292wKxy3R1TUKo8SpAl4Ss7XTJQ&s')"
                            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQg_OOjHVS292wKxy3R1TUKo8SpAl4Ss7XTJQ&s">
                    </div>

                    <button onclick="post()" class="btn btn-primary ms-auto">Post</button>

                </div>
            </div>

            <!-- POSTS -->
            <div class="col-sm-12 col-md-6 col-lg-8">
                <div id="posts" class="m-2"></div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
</body>

</html>
