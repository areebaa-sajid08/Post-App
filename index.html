<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="icon" href="favicon.svg/register-access-login-password-internet-260nw-1836823672.webp" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Georgia, 'Times New Roman', Times, serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: url("https://img.freepik.com/free-photo/beautiful-leaf-watercolor-background-brown-autumn-season_53876-128734.jpg?semt=ais_hybrid&w=740&q=80");
            background-size: cover;
            background-position: center;
        }

        .wrapper {
            width: 420px;
            background-color: transparent;
            border: 2px solid #656D3F;
            backdrop-filter: blur(10px);
            color: rgb(64, 32, 32);
            border-radius: 12px;
            padding: 30px 40px;
        }

        .wrapper h1 {
            font-size: 36px;
            text-align: center;
        }

        .wrapper .input-box {
            position: relative;
            width: 100%;
            height: 50px;
            margin: 30px 0;
        }

        .input-box input {
            width: 100%;
            height: 100%;
            background-color: transparent;
            border: none;
            outline: none;
            border: 2px solid #656D3F;
            border-radius: 30px;
            font-size: 16px;
            color: rgb(64, 32, 32);
            padding: 20px 45px 20px 20px;
        }

        .input-box input::placeholder {
            color: rgb(64, 32, 32);
        }

        .input-box i {
            position: absolute;
            right: 10px;
            top: 17px;
            transform: translate(-50%);
            font-size: 20px;
        }

        .wrapper .remember-forgot {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            margin: -15px 0 15px;
        }

        .remember-forgot label input {
            accent-color: rgb(64, 32, 32);
            margin-right: 3px;
        }

        .remember-forgot a {
            color: rgb(64, 32, 32);
            text-decoration: none;
        }

        .remember-forgot a:hover {
            text-decoration: underline;
        }

        .wrapper .btn {
            width: 100%;
            height: 45px;
            background: white;
            border: none;
            outline: none;
            border-radius: 30px;
            box-shadow: 0 0 10px rgba(0, 0, 0 .1);
            cursor: pointer;
            font-size: 16px;
            color: #333;
            font-weight: 700;
        }

        .wrapper .register-link {
            font-size: 15px;
            text-align: center;
            margin: 20px 0 15px;
        }

        .register-link p a {
            color: rgb(64, 32, 32);
            text-decoration: none;
            font-weight: 700;
        }

        .register-link p a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <form action="">
            <h1>Login</h1>
            <div class="input-box">
                <input id="name" type="text" placeholder="Username" required>
                <i class="fa-solid fa-user"></i>
            </div>
            <div class="input-box">
                <input id="password" type="password" placeholder="Password" required>
                <i class="fa-solid fa-lock"></i>
            </div>
            <div class="remember-forgot">
                <label>
                    <input type="checkbox">Remember me
                </label>
                <a href="#">Forgot Password?</a>
            </div>
            <button type="button" onclick="login()" class="btn">Login</button>
            <div class="register-link">
                <p>Don't have an account? <a href="#">Register</a></p>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        function login() {
            var userName = document.getElementById("name");
            var password = document.getElementById("password");

            if (userName.value.trim() && password.value.trim()) {
                Swal.fire({
                    icon: "success",
                    title: "Login Successful!",
                    showConfirmButton: false,
                    timer: 1000
                }).then(() => {
                    window.location.href = "post.html"
                })
            } else {
                Swal.fire({
                    icon: "error",
                    title: "Error",
                    text: "Username & Password cannot be empty!"
                })
            }
        }
    </script>
</body>

</html>
